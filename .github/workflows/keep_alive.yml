name: Keep Streamlit Apps Awake

on:
  schedule:
    - cron: '0 */10 * * *' # Runs every 10 hours
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wake Up Apps
        run: |
          python -c "
          import asyncio
          from playwright.async_api import async_playwright

          async def wake_apps():
              # Corrected URLs with mandatory commas between each entry
              urls = [
                  'https://aanalytics-app-abhishek-jha-uw.streamlit.app/',
                  'https://abhishek-jha-uw-forecasting-app-bu6esr3b9qxhwgkeu6rer7.streamlit.app/',
                  'https://dynamic-pricing-elasticity-simulator-m9pycn5tudxyqrevs3spwl.streamlit.app/',
                  'https://a-b-testing-experimentation-lqmnpr27pbugetibd5xdjk.streamlit.app/',
                  'https://customer-health-churn-early-warning-system-bwvjzcmbxnmvxgrudsv.streamlit.app/',
                  'https://competitive-landscape-mapping-f66enxmzgca3xjuvhzozae.streamlit.app/',
                  'https://guardiansql-xuah5wqluljyfhb5fe9olu.streamlit.app/',
                  'https://recommendation-system-user-based-collaborative-filtering-uvhmq.streamlit.app/',
                  'https://rag-abhi-uw.streamlit.app/'
              ]
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  for url in urls:
                      print(f'Attempting to wake: {url}')
                      context = await browser.new_context()
                      page = await context.new_page()
                      try:
                          # Increased timeout to 90s to account for waking from cold start
                          await page.goto(url, wait_until='networkidle', timeout=90000)
                          await asyncio.sleep(10) 
                          print(f'Successfully pinged: {url}')
                      except Exception as e:
                          print(f'Warning: Could not reach {url} -> {e}')
                      await page.close()
                      await context.close()
                  await browser.close()

          asyncio.run(wake_apps())
          "
